[project]
name = "memoryguard-models"
version = "0.1.0"
description = "MemoryGuard model layer: stable model interfaces, registry, and local model implementations."
requires-python = ">=3.11"
license = "Apache-2.0"
# Depends on core interfaces only; never imports commercial model implementations.
dependencies = ["memoryguard-core"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["memoryguard_models"]
