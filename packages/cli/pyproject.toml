[project]
name = "memoryguard-cli"
version = "0.1.0"
description = "MemoryGuard OSS CLI (Typer) — `memoryguard` command against the local engine."
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "memoryguard-core",
    "memoryguard-models",
    "typer>=0.12",
    "rich>=13.0",
    "httpx>=0.27",
]

[project.scripts]
memoryguard = "memoryguard_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["memoryguard_cli"]
