[project]
name = "memoryguard"
version = "0.1.0"
description = "MemoryGuard OSS Python SDK — thin client over the core engine (local) or REST API (remote)."
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = ["memoryguard-core", "httpx>=0.24"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["memoryguard"]
