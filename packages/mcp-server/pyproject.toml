[project]
name = "memoryguard-mcp-server"
version = "0.1.0"
description = "MemoryGuard OSS MCP server — exposes memory tools/resources to AI coding agents."
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = ["memoryguard-core"]

[project.optional-dependencies]
mcp = ["mcp>=1.2.0"]

[project.scripts]
memoryguard-mcp = "memoryguard_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["memoryguard_mcp"]
