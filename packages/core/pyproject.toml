[project]
name = "memoryguard-core"
version = "0.1.0"
description = "MemoryGuard OSS core engine: memory records, store, trust, retrieval, ingestion."
requires-python = ">=3.11"
license = "Apache-2.0"
# Core depends on NO commercial package. Commercial behavior is injected via
# interfaces (AuditSink, PolicyProvider, IngestionInspector) and feature flags.
dependencies = []

# Optional cloud-store backend (PostgreSQL + pgvector). NOT required for the
# OSS local-first core: psycopg is imported lazily and only when a
# ``PostgresStore`` is constructed (cloud_store flag). Install with
# ``uv sync --extra cloud`` to run the Postgres contract tests against a server.
[project.optional-dependencies]
cloud = [
    "psycopg[binary]>=3.1",
    "pgvector>=0.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["memoryguard_core"]
